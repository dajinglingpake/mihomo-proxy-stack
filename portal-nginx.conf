server {
    listen 3001;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /index.js {
        proxy_pass http://127.0.0.1:3002/index.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /main.js {
        proxy_pass http://127.0.0.1:3002/main.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /main.css {
        proxy_pass http://127.0.0.1:3002/main.css;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(?:roboto-light|roboto-bold|jetbrainsmononl-regular|3x_static_iconfont|144x144|168x168|192x192|256x256|512x512|apple-touch-icon|favicon|json|uri)\.(?:woff2|woff|ttf|png|svg|ico)$ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /registerSW.js {
        proxy_pass http://127.0.0.1:3002/registerSW.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /manifest.webmanifest {
        proxy_pass http://127.0.0.1:3002/manifest.webmanifest;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /download/ {
        proxy_pass http://127.0.0.1:3002/download/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /share/ {
        proxy_pass http://127.0.0.1:3002/share/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
        try_files /index.html =404;
    }

    location = /substore {
        return 302 /substore/;
    }

    location /substore/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        sub_filter_types text/html application/javascript;
        sub_filter_once off;
        sub_filter '<script async type="module" crossorigin src="/index.js"></script>' '<script>(function(){var localApi={current:"local",apis:[{name:"local",url:window.location.origin}]};localStorage.setItem("hostAPI",JSON.stringify(localApi));localStorage.setItem("backendConfigured","true");sessionStorage.removeItem("showMagicPathDialog");sessionStorage.removeItem("skippedConnectionCycle");})();</script><style>#home-shortcut{position:fixed;left:14px;top:14px;z-index:2147483647;display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:14px;background:#1f7a57;color:#fff;text-decoration:none;font:700 14px/1 "Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;box-shadow:0 14px 32px rgba(23,32,24,.28);border:1px solid rgba(255,255,255,.16)}@media (max-width:760px){#home-shortcut{left:10px;top:10px;padding:10px 12px;font-size:13px}}</style><script async type="module" crossorigin src="/substore/index.js"></script>';
        sub_filter '<body>' '<body><a id="home-shortcut" href="/">返回主页</a>';
        sub_filter 'url(/' 'url(/substore/';
        sub_filter 'href="/' 'href="/substore/';
        sub_filter 'src="/' 'src="/substore/';
        sub_filter '"/api/' '"/substore/api/';
        sub_filter "'/api/" "'/substore/api/";
        sub_filter '"/share/' '"/substore/share/';
        sub_filter "'/share/" "'/substore/share/";
        sub_filter '"/download/' '"/substore/download/';
        sub_filter "'/download/" "'/substore/download/";
        sub_filter '"/manifest.webmanifest"' '"/substore/manifest.webmanifest"';
        sub_filter '"/registerSW.js"' '"/substore/registerSW.js"';
        sub_filter '"/index.js"' '"/substore/index.js"';
        sub_filter '"/main.js"' '"/substore/main.js"';
        sub_filter '"/main.css"' '"/substore/main.css"';
    }

    location = /xd {
        return 302 http://$host:3003/;
    }

    location /xd/ {
        return 302 http://$host:3003/;
    }

    location /backend/ {
        proxy_pass http://127.0.0.1:19090/;
        proxy_http_version 1.1;
        proxy_set_header Authorization "Bearer 123456";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /manage-api/ {
        proxy_pass http://127.0.0.1:3010/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
