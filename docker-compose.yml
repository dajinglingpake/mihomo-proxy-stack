services:
  mihomo:
    image: metacubex/mihomo:latest
    container_name: mihomo
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: Asia/Shanghai
    entrypoint:
      - /bin/sh
      - /start-mihomo.sh
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config:/root/.config/mihomo
      - ./scripts/start-mihomo.sh:/start-mihomo.sh:ro

  metacubexd:
    image: mihomo-metacubexd:${METACUBEXD_VERSION:-1.267.0}
    build:
      context: .
      dockerfile: Dockerfile.metacubexd
      args:
        METACUBEXD_VERSION: ${METACUBEXD_VERSION:-1.267.0}
        CONFIG_HELPER_CACHE_BUST: ${CONFIG_HELPER_CACHE_BUST:-v12670-groups11}
    container_name: metacubexd
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: Asia/Shanghai
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  proxy-portal:
    image: nginx:alpine
    container_name: proxy-portal
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: Asia/Shanghai
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./portal:/usr/share/nginx/html:ro
      - ./portal-nginx.conf:/etc/nginx/conf.d/default.conf:ro

  sub-store:
    image: xream/sub-store:latest
    container_name: sub-store
    restart: unless-stopped
    ports:
      - "3002:3001"
    environment:
      TIME_ZONE: Asia/Shanghai
      TZ: Asia/Shanghai
      SUB_STORE_FRONTEND_BACKEND_PATH: /
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./sub-store-data:/opt/app/data

  mihomo-sync:
    image: mihomo-sync:${MIHOMO_SYNC_VERSION:-local}
    build:
      context: .
      dockerfile: Dockerfile.mihomo-sync
    container_name: mihomo-sync
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: Asia/Shanghai
    working_dir: /app
    command:
      - python
      - /app/scripts/auto_sync.py
      - --loop
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./:/app
