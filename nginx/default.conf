server {
    listen 3001;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /substore-helper.js {
        proxy_pass http://127.0.0.1:3002/substore-helper.js;
        proxy_intercept_errors on;
        error_page 404 = @substore_helper_local;
        add_header Cache-Control "no-store";
    }

    location @substore_helper_local {
        root /usr/share/nginx/html;
        try_files /substore-helper.js =404;
        add_header Cache-Control "no-store";
    }

    location = /setup {
        return 302 /;
    }

    location = /setup/ {
        return 302 /;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /backend/ {
        proxy_pass http://127.0.0.1:19090/;
        proxy_http_version 1.1;
        proxy_set_header Authorization "Bearer 123456";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /manage-api/ {
        proxy_pass http://127.0.0.1:3010/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /substore {
        return 302 /substore/;
    }

    location /substore/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        sub_filter_types text/html application/javascript;
        sub_filter_once off;
        sub_filter '<script async type="module" crossorigin src="/index.js"></script>' '<script>(function(){var localApi={current:"local",apis:[{name:"local",url:window.location.origin}]};localStorage.setItem("hostAPI",JSON.stringify(localApi));localStorage.setItem("backendConfigured","true");sessionStorage.removeItem("showMagicPathDialog");sessionStorage.removeItem("skippedConnectionCycle");})();</script><script src="/substore-helper.js"></script><script async type="module" crossorigin src="/substore/index.js"></script>';
        sub_filter 'url(/' 'url(/substore/';
        sub_filter 'href="/' 'href="/substore/';
        sub_filter 'src="/' 'src="/substore/';
        sub_filter '"/api/' '"/substore/api/';
        sub_filter "'/api/" "'/substore/api/";
        sub_filter '"/share/' '"/substore/share/';
        sub_filter "'/share/" "'/substore/share/";
        sub_filter '"/download/' '"/substore/download/';
        sub_filter "'/download/" "'/substore/download/";
        sub_filter '"/manifest.webmanifest"' '"/substore/manifest.webmanifest"';
        sub_filter '"/registerSW.js"' '"/substore/registerSW.js"';
        sub_filter '"/index.js"' '"/substore/index.js"';
        sub_filter '"/main.js"' '"/substore/main.js"';
        sub_filter '"/main.css"' '"/substore/main.css"';
    }

    location = /substore/index.js {
        proxy_pass http://127.0.0.1:3002/index.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /substore/main.js {
        proxy_pass http://127.0.0.1:3002/main.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /substore/main.css {
        proxy_pass http://127.0.0.1:3002/main.css;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /substore/registerSW.js {
        proxy_pass http://127.0.0.1:3002/registerSW.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /substore/manifest.webmanifest {
        proxy_pass http://127.0.0.1:3002/manifest.webmanifest;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/substore/(?:roboto-light|roboto-bold|jetbrainsmononl-regular|3x_static_iconfont|144x144|168x168|192x192|256x256|512x512|apple-touch-icon|favicon|json|uri)\.(?:woff2|woff|ttf|png|svg|ico)$ {
        rewrite ^/substore/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /substore/api/ {
        proxy_pass http://127.0.0.1:3002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /substore/download/ {
        proxy_pass http://127.0.0.1:3002/download/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /substore/share/ {
        proxy_pass http://127.0.0.1:3002/share/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /substore/api/sub/flow/ {
        proxy_pass http://127.0.0.1:3010/substore-flow/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
