<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>代理控制台</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --panel: rgba(255, 252, 246, 0.96);
        --card: rgba(255, 255, 255, 0.84);
        --line: rgba(20, 30, 22, 0.11);
        --text: #172018;
        --muted: #647262;
        --primary: #1f7a57;
        --secondary: #d28a37;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(210, 138, 55, 0.16), transparent 30%),
          radial-gradient(circle at top right, rgba(31, 122, 87, 0.14), transparent 24%),
          linear-gradient(180deg, #faf6ee 0%, #edf4ee 100%);
        padding: 24px;
      }
      .shell {
        width: min(960px, 100%);
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        box-shadow: 0 28px 70px rgba(23, 32, 24, 0.08);
        padding: 28px;
      }
      .eyebrow {
        margin: 0 0 10px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        color: var(--secondary);
      }
      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.15;
      }
      .desc {
        margin: 14px 0 0;
        max-width: 720px;
        color: var(--muted);
        line-height: 1.7;
        font-size: 15px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        margin-top: 26px;
      }
      .card {
        display: grid;
        gap: 12px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--card);
        padding: 22px;
      }
      .card h2 {
        margin: 0;
        font-size: 20px;
      }
      .meta {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
        font-size: 14px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        color: #fff;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
      }
      .btn.secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--line);
      }
      .tips {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px dashed var(--line);
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }
      code {
        font-family: "JetBrains Mono", "Fira Code", monospace;
        font-size: 12px;
      }
      @media (max-width: 820px) {
        .grid { grid-template-columns: 1fr; }
      }
      @media (max-width: 760px) {
        body { padding: 16px; }
        .shell { padding: 20px; }
        h1 { font-size: 26px; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">MIHOMO CONTROL</p>
      <h1>入口页只负责跳转</h1>
      <p class="desc">首页只保留导航职责。订阅导入、下载生成配置、切换已有配置，这些操作都应在订阅管理界面完成；节点查看和策略控制继续走独立控制面板。</p>

      <section class="grid">
        <article class="card">
          <h2>订阅管理</h2>
          <p class="meta">进入后处理订阅地址导入、配置生成、配置切换和高级订阅编辑。</p>
          <a class="btn" href="/substore/">打开订阅管理</a>
        </article>

        <article class="card">
          <h2>节点控制</h2>
          <p class="meta">打开 MetaCubeXD 面板查看节点状态、策略组和连接详情。</p>
          <a class="btn secondary" id="openXdLink" href="#">打开节点控制</a>
        </article>
      </section>

      <div class="tips">
        当前首页不再承载业务操作，避免和 <code>/substore/</code> 的主流程重复。
      </div>
    </main>

    <script>
      document.getElementById("openXdLink").href = `${window.location.protocol}//${window.location.hostname}:3003/`;
    </script>
  </body>
</html>
